prior_treatment_requirements:
- 'Inclusion Criteria:'
- '* Histologically or cytologically confirmed locally advanced unresectable or metastatic
  solid tumors with KRAS G12C mutation'
- '* Received and progressed or been intolerant to prior standard therapy OR standard
  therapy is considered inappropriate OR an investigational agent is considered standard
  of care'
- '* Eastern Cooperative Oncology Group (ECOG) performance status 0 or 1'
- '* Adequate hematological, renal, and hepatic function'
- '* Agrees not to participate in another interventional study while receiving study
  drug'
- 'Exclude - Exclusion Criteria:'
- Exclude - * Leptomeningeal disease or carcinomatous meningitis
- Exclude - * Clinically significant toxicity resulting from prior cancer therapies
- Exclude - * Known or suspected hypersensitivity to FMC-376 or any components of
  the study drug
- Exclude - * Condition that would interfere with study drug absorption
- Exclude - * Any illness or medical history that would impact safety or compliance
  with study requirements or impact ability to interpret study data
