prior_treatment_requirements:
- 'Key Inclusion Criteria:'
- "1. Eastern Cooperative Oncology Group (ECOG) performance status \u22641"
- 2. Presence of primary hepatocellular carcinoma in the liver with presence of measurable
  tumour by RECIST 1.1 criteria, that is not amenable to, or failed, conventional
  treatment options
- 3. Serum HBsAg positivity
- 4. Non-cirrhotic or compensated cirrhosis Child-Pugh A (5 - 6 points)
- 5. Life expectancy of at least 3 months
- 6. HLA class 1 profile matching HLA-class I restriction element of the available
  T cell receptors (restricted by either HLA-A\*02:01 or HLA-A\*24:02).
- 'Exclude - Key Exclusion Criteria:'
- Exclude - 1. Brain metastasis
- Exclude - 2. Second primary malignancy that is clinically detectable at the time
  of consideration for study enrolment, except for in situ carcinoma of the cervix,
  non-melanoma skin carcinoma localized prostate cancer, ductal carcinoma in situ,
  or Stage I uterine cancer and superficial bladder tumors
- Exclude - 3. Use of immune checkpoint inhibitors and/or tyrosine kinase inhibitor
  (TKI) within 5 half-lives of the drug prior to baseline liver biopsy procedure
- Exclude - 4. Alterations of concomitant medications which could potentially cause
  drug induced liver injury and affect liver biopsy result within 3 months of baseline
  liver biopsy procedure.
- Exclude - 5. Likelihood to require any immunosuppressive treatments during the period
  of the clinical trial.
- Exclude - 6. 7\. Last RFA/TACE treatment within 3 months prior to first LioCyx-M
  infusion; Last Y90 therapy treatment within 6 months prior to first dose of mRNA
  HBV/TCR T-cells
- Exclude - 7. Decompensated cirrhosis Child-Pugh B or C (7 - 15 points)
- Exclude - 8. Concurrent administration of any other anti-tumour therapy, including
  cytotoxic chemotherapy, hormonal therapy, and immunotherapy.
- Exclude - 9. Use of any investigational product (IP) or investigational medical
  device within 30 days of study drug administration
- "Exclude - 10. Serum HBV DNA levels \u2265 200 IU/ml at screening"
- "Exclude - 11. Serum HBsAg levels \u2265 10,000 IU/ml at screening"
- Exclude - 12. Lack of peripheral venous or central venous access or any condition
  that would interfere with drug administration or collection of study samples
- Exclude - 13. Any condition or active infections which, in the investigator's opinion,
  makes the subject unsuitable for trial participation
- Exclude - 14. Women who are pregnant or breast-feeding
short_title: Redirected HBV-Specific T Cells in Patients With HBV-related HCC (SAFE-T-HBV)
