status: open to accrual
summary: This is a phase Ib followed by phase II clinical trial evaluating the safety
  and efficacy of combination of ADG106 with pembrolizumab in patients with metastatic
  cancers. The Phase Ib dose finding part will include all solid tumor subtypes with
  treatment refractory disease, while phase II will focus on only patients with TNBC.
