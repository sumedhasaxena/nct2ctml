status: open to accrual
summary: This is a Phase III, 2-arm, randomized, open label, multicenter, global study
  assessing the efficacy and safety of puxitatug samrotecan compared to physician's
  choice of chemotherapy (doxorubicin or paclitaxel) in participants with B7-H4 selected
  advanced/metastatic EC that progressed following platinum based chemotherapy and
  anti-PD-1/anti-PD-L1 therapy.
