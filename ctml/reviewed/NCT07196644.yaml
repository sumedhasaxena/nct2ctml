prior_treatment_requirements:
- 'Inclusion Criteria:'
- '* Locally advanced/metastatic solid tumors with documented MET amplification via
  Local next generation sequencing (NGS) or Central NGS via FoundationOne Companion
  Diagnostic (F1CDx).'
- '* Eastern Cooperative Oncology Group (ECOG) Performance Status of 0 to 1'
- '* Measurable disease at baseline per Response Evaluation Criteria in Solid Tumors
  (RECIST) version 1.1 or Response Assessment in Neuro-Oncology (RANO) criteria as
  appropriate to tumor type.'
- '* Received prior systemic therapy appropriate for their tumor type and stage of
  disease and who have no satisfactory alternative therapy for advanced solid tumors
  that would be expected to provide a substantial survival benefit for their tumor
  type.'
- '* If participant has central nervous system (CNS) metastasis, these should be clinically
  asymptomatic or radiologically stable (i.e., without evidence of progression after
  definitive treatment'
- 'Exclude - Exclusion Criteria:'
- Exclude - * Current, historical, or suspected (non-infectious) interstitial lung
  disease (ILD)/pneumonitis that required steroids.
- Exclude - * Any major, life-threatening conditions and life expectancy should be
  at least 12 weeks.
short_title: A Study to Assess Adverse Events and Change in Disease Activity in Participants
  12 Years of Age or Older With Locally Advanced or Metastatic Solid Tumors That Harbor
  MET Amplification Receiving Intravenously Infused Telisotuzumab Adizutecan
