summary: 'Cancer is a condition where cells in a specific part of body grow and reproduce
  uncontrollably. The purpose of this study is to assess adverse events and change
  in disease activity of telisotuzumab adizutecan.


  Telisotuzumab adizutecan is an investigational drug being developed for the treatment
  of locally advanced or metastatic solid tumors that harbor MET amplification. This
  study will have 1 arm where participants will receive telisotuzumab adizutecan.
  Approximately 125 participants 12 years of age or older. with solid tumors harboring
  MET amplification will be enrolled in the study in up to 55 sites around the world.


  Participants will receive intravenous (IV) telisotuzumab adizutecan, as part of
  the 61.5 month study duration.


  There may be higher treatment burden for participants in this trial compared to
  their standard of care. Participants will attend regular visits during the study
  at an approved institution (hospital or clinic). The effect of the treatment will
  be frequently checked by medical assessments, blood tests, questionnaires and side
  effects.'
