status: open to accrual
summary: The purpose of this study is to understand the safety, tolerability, efficacy,
  pharmacokinetic (PK), pharmacodynamic (PD), and preliminary efficacy of orally administered
  AZD3632 in participants with advanced haematologic malignancies with KMT2Ar, NPM1m,
  or other genotypes associated with homeobox (HOX) overexpression.
