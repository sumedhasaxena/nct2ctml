prior_treatment_requirements:
- 'Key Inclusion Criteria:'
- "* Participant is an adult man \u2265 18 years of age."
- '* Participant must have histologically and/or cytologically confirmed adenocarcinoma
  of the prostate without neuroendocrine or small cell features (current or prior
  biopsy of the prostate and/or metastatic site).'
- "* Participant must have \u2265 1 metastatic lesion that is present on screening/baseline\
  \ CT, MRI, or bone scan imaging obtained \u2264 28 days prior to start of treatment\
  \ (Part 1a dose escalation) or randomization (Part 1b dose expansion and Part 2)."
- '* Participant must have progressive mCRPC.'
- '* Participant must have a castrate level of serum/plasma testosterone (\< 50 ng/dL
  or \< 1.7 nmol/L).'
- '* Prior ARPI therapy:'
- '* Part 1a and 1b only: must have progressed on at least one prior second generation
  ARPI (abiraterone, enzalutamide, darolutamide, or apalutamide).'
- '* Part 2 only: must have progressed on one prior second generation ARPI (abiraterone,
  enzalutamide, darolutamide, or apalutamide).'
- '* Prior chemotherapy:'
- "* Part 1a dose escalation only: may have received \u2264 2 prior lines of chemotherapy\
  \ in CRPC setting. Note: Prior chemotherapy is permitted in the HSPC setting."
- '* Part 1b dose expansion/optimization only: may have received up to one prior line
  of chemotherapy in CRPC setting. Note: Prior chemotherapy is permitted in the HSPC
  setting.'
- "* Part 2 only: Participants must be taxane-na\xEFve in mCRPC setting; prior chemotherapy\
  \ permitted in HSPC setting only"
- 'Exclude - Key Exclusion Criteria:'
- Exclude - * Previous treatment with any PRC2 inhibitor, including but not limited
  to EZH2 inhibitors, EZH2/1 inhibitors, or embryonic ectoderm development (EED) inhibitors.
- Exclude - * Previous treatment with a protein degrader compound that targets the
  AR.
- Exclude - * Known hypersensitivity or contraindication to any of the study treatment
  components or its excipients or to drugs of similar chemical classes.
- Exclude - * Treatment with any investigational agent within 28 days (or 5 half-lives,
  whichever is longer) prior to study entry.
- Exclude - * Previous treatment with radioligand therapy in the mCRPC setting, except
  in Part 1a where participants may have received RLT in mCRPC setting.
- "Exclude - * Participants with evidence of mCRPC or biochemical recurrence / PSA\
  \ only disease or asymptomatic prostate cancer without known metastatic disease\
  \ and with no requirement for therapy and with normal PSA for \u2265 1 year prior\
  \ to study entry."
- Exclude - * Participants with a history of CNS metastases must have received therapy
  (surgery, radiotherapy, gamma knife) and be neurologically stable, asymptomatic,
  and not receiving corticosteroids for the purpose of maintaining neurologic integrity.
  Those with leptomeningeal disease are eligible if those areas have been treated,
  are stable, and no neurological impairment is present. For those with parenchymal
  CNS metastasis (or a history of CNS metastasis), baseline and subsequent radiological
  imaging must include evaluation of the brain with MRI (preferred) or CT with contrast.
- Exclude - Other protocol-defined inclusion/exclusion criteria may apply.
short_title: An Open-label Dose Escalation and Expansion, Followed by a Phase II Study
  of Tulmimetostat (DZR123) and JSB462 (Luxdegalutamide) in Patients With Progressive
  Metastatic Castrate Resistant Prostate Cancer (mCRPC) (TulmiSTAR-01)
