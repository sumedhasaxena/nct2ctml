summary: This is a two-part, Phase I/II, open-label, global, multicenter study assessing
  the safety and efficacy of the combination of tulmimetostat (DZR123) and JSB462
  (luxdegalutamide) versus standard of care in participants with progressive metastatic
  castrate resistant prostate cancer (mCRPC).
