prior_treatment_requirements:
- 'Inclusion Criteria:'
- 'The main inclusion criteria include but are not limited to the following:'
- '* Has locally advanced unresectable or metastatic solid tumor malignancy other
  than colorectal cancer and has progressed on, or following, standard of care systemic
  treatment'
- '* Has a tumor that demonstrates the presence of Kirsten rat sarcoma (KRAS) G12C
  mutation'
- 'Exclude - Exclusion Criteria:'
- 'Exclude - The main exclusion criteria include but are not limited to the following:'
- Exclude - * Has uncontrolled, significant cardiovascular disease or cerebrovascular
  disease
- Exclude - * Has known additional malignancy that is progressing or has required
  active treatment within the past 3 years
- Exclude - * Has known active central nervous system metastases and/or carcinomatous
  meningitis and/or primary brain tumors
- Exclude - * Has active infection, other than those permitted per protocol, requiring
  systemic therapy
- Exclude - * Has not adequately recovered from major surgery or has ongoing surgical
  complications
short_title: A Clinical Study of MK-1084 in People With Advanced Solid Tumors (MK-1084-014)
