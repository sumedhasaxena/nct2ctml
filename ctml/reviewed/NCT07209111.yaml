status: open to accrual
summary: 'Researchers want to learn if MK-1084 given alone or with cetuximab can treat
  certain advanced solid tumors in people with the KRAS G12C mutation.


  The goals of this study are to learn:


  * How many people have the cancer respond (get smaller or go away) to MK-1084 alone
  or with cetuximab and how these responses compare

  * About the safety of MK-1084 alone or with cetuximab and if people tolerate the
  treatments.'
