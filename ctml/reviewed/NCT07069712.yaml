status: open to accrual
summary: GEMINI-PeriOp GC study will assess the safety, tolerability, pharmacokinetics
  (PK) and preliminary anti-tumor activity of novel agents or novel combinations as
  perioperative treatment in participants with locally advanced resectable gastric,
  gastroesophageal junction (GEJ), or esophageal adenocarcinoma who have not received
  previous treatment for the disease.
