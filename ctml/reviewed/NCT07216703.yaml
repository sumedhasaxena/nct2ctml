summary: 'Researchers are looking for new ways to treat metastatic cervical cancer.
  Cervical cancer is cancer in the cervix, the lower part of the uterus (womb). Metastatic
  means the cancer has spread to other parts of the body.


  Researchers want to learn about giving the study medicine sacituzumab tirumotecan
  (also called sac-TMT or MK-2870) along with pembrolizumab and bevacizumab treatments.
  Sac-TMT is an antibody drug conjugate, which is a type of medicine that attaches
  to specific targets on cancer cells and delivers treatment to destroy those cells.


  The goals of this study are to learn:


  * About the safety of sac-TMT with pembrolizumab and bevacizumab, and if people
  tolerate them when given together, and

  * If people who receive sac-TMT and pembrolizumab, with or without bevacizumab,
  live longer overall or without their cancer getting worse as compared to those who
  receive standard treatment'
