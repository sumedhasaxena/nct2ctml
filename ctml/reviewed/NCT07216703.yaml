      arm_internal_id: 1
      arm_description: 'During induction treatment, participants will receive pembrolizumab
        200 mg q3w, paclitaxel 175 mg/m\^2 q3w, and cisplatin 50 mg/m\^2 q3w (or carboplatin
        area under the curve \[AUC\]5 mg/mL/min q3w). Participants may also receive
        bevacizumab 15 mg/kg q3w at the investigator''s discretion. Each cycle will
        be 3 weeks long and treatment will continue for up to 6 cycles (up to approximately
        4 months).


        During maintenance treatment, participants will receive sac-TMT 4 mg/kg q2w
        and pembrolizumab 400 mg q6w for up to 14 cycles (up to approximately 19 months).
        Participants may also receive bevacizumab 15 mg/kg q3w, at the investigator''s
        discretion, until a treatment discontinuation criterion is met. Each cycle
        will be 6 weeks long.'
