prior_treatment_requirements:
- 'Inclusion Criteria:'
- 1. Histologically or cytologically confirmed metastatic or advanced-stage solid
  malignant tumor or HR+/HER2- breast cancer.
- 2. Have progressed on, were intolerant to, or experienced disease recurrence after
  standard therapy and have no available effective or tolerable treatment options
  to derive clinically meaningful benefit.
- 3. Tumor must have documented specific mutation profile as outlined below based
  on local laboratory testing.
- 4. Participants with solid tumors or HR+/HER2- breast cancer with AKT1 E17K mutations.
- 5. Measurable disease according to RECIST v1.1 criteria.
- 6. Formalin-fixed paraffin-embedded tumor specimen available for submission.
- 7. Eastern Cooperative Oncology Group performance status of 0 or 1.
- 'Exclude - Exclusion Criteria:'
- Exclude - 1. Previously documented activating mutations in KRAS, NRAS, HRAS, or
  BRAF.
- Exclude - 2. Inadequate bone marrow reserve or organ function.
- Exclude - 3. Clinically significant abnormalities of glucose metabolism.
- Exclude - 4. Participants who are symptomatic or have uncontrolled brain metastases.
- Exclude - 5. Requires treatment with certain medications.
- Exclude - Participants must meet other inclusion/exclusion criteria.
short_title: A Phase 1 Study of ATV-1601 in Patients With Advanced Cancer That Have
