summary: This is a Phase 1, open-label study to evaluate the safety and tolerability
  of ATV-1601 administered orally in adults with AKT1 E17K-mutant, advanced solid
  tumors and also in HR+/HER2- advanced and metastatic breast cancer, with or without
  fulvestrant.
