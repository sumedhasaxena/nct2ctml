  or Without Osimertinib Versus Platinum-based Doublet Chemotherapy for Participants
  With EGFR-mutated Locally Advanced or Metastatic Non-small Cell Lung Cancer Whose
  Disease Has Progressed on Prior Osimertinib Treatment (TROPION-Lung15)
