status: open to accrual
summary: This study will assess the effect of Dato-DXd in combination with osimertinib
  or Dato-DXd monotherapy versus platinum-based doublet chemotherapy in terms of progression-free
  survival (PFS).
treatment_list:
  step:
  - step_internal_id: 111
    step_code: '1'
    step_type: Registration
    arm:
    - arm_code: 'Group 1: Dato-DXd + Osimertinib Combination Therapy'
      arm_internal_id: 0
      arm_description: Participants will receive Dato-DXd 6 milligrams per kilogram
        (mg/kg) as intravenous (IV) infusion every 3 weeks (Q3W) on Day 1 of every
        21-day cycle, and osimertinib 80 milligrams (mg) once daily (QD) orally, until
        RECIST v1.1-defined radiological progression by investigator, unacceptable
        toxicity, or other discontinuation criterion is met.
      arm_suspended: N
      dose_level:
      - level_code: '0'
        level_description: 'Drug: Dato-DXd'
        level_internal_id: 0
        level_suspended: N
      - level_code: '1'
        level_description: 'Drug: Osimertinib'
        level_internal_id: 1
        level_suspended: N
    - arm_code: 'Group 2: Dato-DXd Monotherapy'
      arm_internal_id: 1
      arm_description: Participants will receive Dato-DXd 6 mg/kg as IV infusion Q3W
        on Day 1 of every 21-day cycle, until RECIST v1.1-defined radiological progression
        by investigator, unacceptable toxicity, or other discontinuation criterion
        is met.
      arm_suspended: N
      dose_level:
      - level_code: '0'
        level_description: 'Drug: Dato-DXd'
        level_internal_id: 0
        level_suspended: N
    - arm_code: 'Group 3: Platinum-based Doublet Chemotherapy'
      arm_internal_id: 2
      arm_description: Participants will receive pemetrexed 500 milligrams per meter
        square (mg/m2) in combination with carboplatin (AUC5) or cisplatin 75 mg/m2
        as IV infusion Q3W for 4 cycles followed by pemetrexed maintenance 500 mg/m2
        as IV infusion Q3W, until RECIST v1.1-defined radiological progression by
        investigator, unacceptable toxicity, or another discontinuation criterion
        is met.
      arm_suspended: N
      dose_level:
      - level_code: '0'
        level_description: 'Drug: Pemetrexed'
        level_internal_id: 0
        level_suspended: N
      - level_code: '1'
        level_description: 'Drug: Carboplatin'
        level_internal_id: 1
        level_suspended: N
      - level_code: '2'
        level_description: 'Drug: Cisplatin'
        level_internal_id: 2
        level_suspended: N
