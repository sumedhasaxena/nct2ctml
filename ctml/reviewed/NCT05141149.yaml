status: open to accrual
summary: The first in human clinical study is planned as an open-label, dose-escalation,
  and dose-expansion, multicentre, two-part, Phase 1/2a study of PBP1510 administered
  to patients with advanced/metastatic pancreatic cancer. The study will be conducted
  in two parts, Part 1 as a PBP1510 single agent dose-escalation, and PBP1510 dose-escalation
  in combination with gemcitabine, and Part 2 as PBP1510 dose-expansion at the RP2D
  in combination with gemcitabine.
