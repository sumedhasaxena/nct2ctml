status: open to accrual
summary: The purpose of this study is to evaluate the safety, tolerability, pharmacokinetic,
  pharmacodynamic, preliminary anti-tumor activity, and to determine the recommended
  Phase II dose (RP2D) of the ALE.P03 monotherapy in adult patients with selected
  squamous solid tumors.
