status: open to accrual
summary: 'Phase I: Characterize safety and tolerability of GVV858 as a single agent
  and in combination with fulvestrant or letrozole. Identify dose range for optimization/recommended
  dose for further clinical evaluation.


  Phase II: Further characterize the safety and tolerability of GVV858 in combination
  with fulvestrant in patients with hormone receptor-positive/human epidermal growth
  factor receptor 2-negative (HR+/HER2-) advanced breast cancer.'
