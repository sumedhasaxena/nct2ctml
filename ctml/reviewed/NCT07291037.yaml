status: open to accrual
summary: TROPION-Lung17 will measure the efficacy and safety of datopotamab deruxtecan
  (Dato-DXd) compared with docetaxel in patients with trophoblast cell surface protein
  2 (TROP2) positive advanced or metastatic lung cancer without actionable genomic
  alterations (AGA).
