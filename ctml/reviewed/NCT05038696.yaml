prior_treatment_requirements:
- 'Inclusion Criteria:'
- '* Fulfil the Diagnosis/ Disease define as:'
- '1. Relapsed B-cell acute lymphoblastic leukaemia/ lymphoma as defined by:'
- Bone marrow disease = or \> 0.01% by MRD as determined by flow cytometry Or CNS
  disease as defined as \> 5 WBCs in CSF by morphology, or flow cytometric or molecular
  evidence of blasts or biopsy proven recurrence in the eye or brain.
- Or Extramedullary relapse as defined by morphological evidence of blasts in the
  testis or any other extramedullary sites
- '2. Induction failure as defined by Day 33/ End of induction:'
- "MRD \u2265 1% by flow cytometry on the Ma-Spore ALL 2020 protocol Or Failure to\
  \ achieve morphological remission defined as \\> 5% blasts after standard induction\
  \ chemotherapy"
- '3. Refractory disease as defined by:'
- "MRD \u2265 0.01% by flow cytometry or molecular methods during 2 or more timepoints\
  \ after induction therapy"
- '4. Any high risk features including :'
- BCR-ABL1, BCR-ABL1-like, - ABL1-r, PDGFRB-r, TCF3-HLF, MLL-r, hypodiploid ALL (\<
  45 chromosomes), p53 pathogenic mutation as defined by RNA Seq or other molecular
  methods.
- 5. Patients who are unable to tolerate standard chemotherapy due to significant
  toxicity as well as other comorbidities
- "* Minimum level of pulmonary reserve defined as grade \u2264 1 dyspnoea and oxygen\
  \ saturation of \\> 95% on room air"
- "* Left ventricular systolic function \u2265 28% confirmed by echocardiogram, or\
  \ left ventricular ejection fraction \u2265 45% confirmed by echocardiogram within\
  \ 3 months of screening"
- "* Karnofsky (age \u2265 16 years) or Lansky (age \\< 16 years) performance status\
  \ \u2265 50 at screening"
- '* Normal Age-adjusted eGFR Creatinine Clearance within 3 months of screening'
- "* Alanine aminotransferase \u2264 5 times the upper limit of normal for age"
- '* Patients with \> 99.9% of CD19 expression on blast cells will be eligible for
  anti-CD19 CAR T-cell infusion.'
- '* Patients with partial or absent CD19 expression (\< 99.9%) on blast cells will
  be eligible to receive combinations of other CAR T-cells depending on the pattern
  of antigen expression.'
- 'Exclude - Exclusion Criteria:'
- Exclude - * Failure to meet any of the inclusion criteria.
- Exclude - * Patients who test positive on urine pregnancy testing and are pregnant
  or are lactating
- Exclude - * Concomitant genetic syndromes associated with BM failure states, such
  as Fanconi anaemia, Kostmann syndrome, Schwachman syndrome, or any other BM failure
  syndrome with the exception of Down syndrome
- Exclude - * Prior malignancy, except carcinoma in situ of the skin or cervix treated
  with curative intent and no evidence of active disease
- Exclude - * Active or latent hepatitis B or active hepatitis C within 8 weeks of
  screening, or any uncontrolled infection at screening
- Exclude - * Positive HIV test within 8 weeks of screening
- Exclude - * Grade 2 to 4 acute graft-vs-host disease (GVHD) or extensive chronic
  GVHD
- Exclude - * Received an investigational medicinal product within 30 days of screening
- Exclude - * Persistent disease or relapse after other forms of CAR-T cell therapy.
